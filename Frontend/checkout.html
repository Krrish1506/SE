<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout &mdash; Stark Avenue</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .checkout-container {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 3rem;
      margin-top: 2rem;
    }
    .checkout-section {
      background: var(--clr-surface);
      border-radius: 12px;
      padding: 2.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);    }
    .checkout-section h2 { 
      margin-bottom: 1.5rem; 
      font-family: var(--ff-heading); 
      border-bottom: 1px solid rgba(255,255,255,0.1); 
      padding-bottom: 0.75rem; 
      font-size: 1.5rem;
    }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    
    .payment-methods { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem; }
    .payment-option {
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.3s ease;
      background: rgba(0,0,0,0.1);
    }
    .payment-option:hover { border-color: var(--clr-text); }
    .payment-option.active { 
      border-color: var(--clr-text); 
      box-shadow: 0 0 0 1px var(--clr-text); 
      background: rgba(255,255,255,0.05);
    }
    .payment-option input[type="radio"] { 
      accent-color: var(--clr-text);
      transform: scale(1.2);
    }
    .payment-option label {
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 0;
      flex: 1;
    }
    .payment-icon { font-size: 1.5rem; opacity: 0.8; }
    
    .card-details {
      display: none;
      margin-top: 1.5rem;
      padding: 1.5rem;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    
    .order-summary {
      background: var(--clr-surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 2.5rem;
      position: sticky;
      top: 100px;
    }
    .order-summary h2 { 
       font-family: var(--ff-heading); 
       margin-bottom: 1.5rem;
       font-size: 1.5rem;
       border-bottom: 1px solid rgba(255,255,255,0.1); 
       padding-bottom: 0.75rem; 
    }
    #checkoutItems {
       max-height: 400px;
       overflow-y: auto;
       margin-bottom: 1.5rem;
       padding-right: 0.5rem;
    }

    #checkoutItems::-webkit-scrollbar { width: 6px; }
    #checkoutItems::-webkit-scrollbar-track { background: transparent; }
    #checkoutItems::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

    .summary-item { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    .summary-item img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
    .summary-item-info { flex: 1; }
    .summary-item-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.2rem; }
    .summary-item-meta { color: var(--clr-text-muted); font-size: 0.85rem; }
    .summary-item-price { font-weight: bold; font-family: monospace; font-size: 1rem; }
    
    .summary-totals {
       margin-top: 1rem; 
       border-top: 1px solid rgba(255,255,255,0.1); 
       padding-top: 1.5rem; 
    }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 0.75rem; color: var(--clr-text-muted); }
    .summary-row.total { 
       font-size: 1.35rem; 
       font-weight: bold; 
       color: var(--clr-text);
       border-top: 1px solid rgba(255,255,255,0.1); 
       padding-top: 1rem; 
       margin-top: 0.5rem; 
    }
    
    @media(max-width: 900px) {
      .checkout-container { grid-template-columns: 1fr; }
      .order-summary { position: static; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header" id="header" role="banner">
    <div class="container">
      <a href="index.html" class="nav-logo" aria-label="Stark Avenue Home">Stark Avenue</a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div class="nav-actions">
        <span style="font-weight: 600; font-size: 0.9rem; color: var(--clr-text-muted);">Secure Checkout <span style="color:var(--clr-text)">&#128274;</span></span>
      </div>
    </div>
  </header>

  <main class="container section">
    <div class="reveal">
      <h1 style="font-family: var(--ff-heading); font-size: var(--fs-xl); margin-bottom: 0.5rem;">Checkout</h1>
      <p style="color: var(--clr-text-muted);">Please review your order and complete the details below.</p>
    </div>

    <form id="checkoutForm" class="checkout-container reveal">
      <!-- Left Column: Forms -->
      <div class="checkout-forms">
        <div class="checkout-section">
          <h2>Shipping Address</h2>
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="address">Street Address</label>
            <input type="text" id="address" placeholder="123 Luxury Lane, Apt 4" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="city">City</label>
              <input type="text" id="city" placeholder="Metropolis" required>
            </div>
            <div class="form-group">
              <label for="state">State / Province</label>
              <input type="text" id="state" placeholder="NY" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="zip">Zip / Postal Code</label>
              <input type="text" id="zip" placeholder="10001" required>
            </div>
            <div class="form-group">
              <label for="country">Country</label>
              <input type="text" id="country" value="United States" required>
            </div>
          </div>
        </div>

        <div class="checkout-section">
          <h2>Payment Method</h2>
          <div class="payment-methods">
            
            <div class="payment-option active" id="optCard">
              <input type="radio" name="paymentMethod" id="methodCard" value="Credit Card" checked>
              <label for="methodCard">Credit / Debit Card</label>
              <span class="payment-icon">&#128179;</span>
            </div>
            <div class="card-details" id="cardDetails" style="display: block;">
              <div class="form-group">
                <label for="cardNumber">Card Number</label>
                <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19">
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="cardExp">Expiration (MM/YY)</label>
                  <input type="text" id="cardExp" placeholder="12/26" maxlength="5">
                </div>
                <div class="form-group">
                  <label for="cardCvv">CVV</label>
                  <input type="password" id="cardCvv" placeholder="123" maxlength="4">
                </div>
              </div>
            </div>

            <div class="payment-option" id="optUpi">
              <input type="radio" name="paymentMethod" id="methodUpi" value="UPI">
              <label for="methodUpi">Pay Online (UPI / Wallet)</label>
              <span class="payment-icon">&#128241;</span>
            </div>

            <div class="payment-option" id="optCod">
              <input type="radio" name="paymentMethod" id="methodCod" value="Cash On Delivery">
              <label for="methodCod">Cash On Delivery (COD)</label>
              <span class="payment-icon">&#128181;</span>
            </div>

          </div>
        </div>
      </div>

      <!-- Right Column: Summary -->
      <div>
        <div class="order-summary">
          <h2>Order Summary</h2>
          <div id="checkoutItems">
            <!-- Injected by JS -->
          </div>
          <div class="summary-totals">
            <div class="summary-row">
              <span>Subtotal</span>
              <span id="chkSubtotal">&#8377;0</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span id="chkShipping">Free</span>
            </div>
            <div class="summary-row total">
              <span>Total</span>
              <span id="chkTotal">&#8377;0</span>
            </div>
          </div>
          <button type="submit" class="btn btn-primary" id="placeOrderBtn" style="width:100%; margin-top:1.5rem; font-size:1.1rem; padding:1rem;">Place Order</button>
        </div>
      </div>
    </form>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert" aria-live="assertive"><span class="toast-icon">&check;</span><span class="toast-message" id="toastMessage">Success!</span></div>

  <script src="product-data.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Check Authentication & Cart
      const token = localStorage.getItem('token');
      if (!token) {
        alert("Please log in to checkout.");
        window.location.href = 'login.html';
        return;
      }

      const items = Cart.getItems();
      if (items.length === 0) {
        alert("Your cart is empty.");
        window.location.href = 'products.html';
        return;
      }

      // 2. Render Cart Items in Summary
      const checkoutItemsContainer = document.getElementById('checkoutItems');
      let subtotal = 0;

      items.forEach(item => {
        subtotal += item.price * item.qty;
        checkoutItemsContainer.innerHTML += `
          <div class="summary-item">
            <img src="${item.img || ''}" alt="${item.name}">
            <div class="summary-item-info">
              <div class="summary-item-title">${item.name}</div>
              <div class="summary-item-meta">Qty: ${item.qty}</div>
            </div>
            <div class="summary-item-price">&#8377;${item.price}</div>
          </div>
        `;
      });

      // Render Totals
      document.getElementById('chkSubtotal').innerHTML = `&#8377;${subtotal}`;
      const shipping = subtotal > 1500 ? 0 : 50;
      document.getElementById('chkShipping').innerHTML = shipping === 0 ? 'Free' : `&#8377;${shipping}`;
      document.getElementById('chkTotal').innerHTML = `&#8377;${subtotal + shipping}`;

      // 3. Handle Payment Toggles
      const options = document.querySelectorAll('.payment-option');
      const radios = document.querySelectorAll('input[name="paymentMethod"]');
      const cardDetails = document.getElementById('cardDetails');

      options.forEach(opt => {
        opt.addEventListener('click', () => {
          options.forEach(o => o.classList.remove('active'));
          opt.classList.add('active');
          const radio = opt.querySelector('input[type="radio"]');
          radio.checked = true;
          
          if (radio.value === 'Credit Card') {
             cardDetails.style.display = 'block';
             document.getElementById('cardNumber').required = true;
             document.getElementById('cardExp').required = true;
             document.getElementById('cardCvv').required = true;
          } else {
             cardDetails.style.display = 'none';
             document.getElementById('cardNumber').required = false;
             document.getElementById('cardExp').required = false;
             document.getElementById('cardCvv').required = false;
          }
        });
      });

      // 4. Handle Order Placement
      document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const btn = document.getElementById('placeOrderBtn');
        btn.textContent = 'Processing...';
        btn.disabled = true;

        const selectedPayment = document.querySelector('input[name="paymentMethod"]:checked').value;

        const payload = {
          shipping_address: {
            name: document.getElementById('fullName').value,
            street: document.getElementById('address').value,
            city: document.getElementById('city').value,
            state: document.getElementById('state').value,
            zip: document.getElementById('zip').value,
            country: document.getElementById('country').value,
            payment_method: selectedPayment
          },
          items: items.map(i => ({
             product_id: i.id || 1, 
             quantity: i.qty, 
             price: i.price 
          }))
        };

        try {
          const res = await fetch('http://localhost:8000/orders/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(payload)
          });

          if (!res.ok) {
             let errData;
             try { errData = await res.json(); } catch(err){ errData = {detail: "Failed to place order."}; }
             throw new Error(errData.detail || "Request failed");
          }

          Cart.save([]); // Clear cart
          Cart.updateUI();
          
          btn.textContent = 'Success!';
          showToast("Order Placed Successfully!", "success");

          setTimeout(() => {
             // After checkout, go back to home, maybe we will build an order success page later
             window.location.href = 'index.html';
          }, 2000);

        } catch (err) {
          alert("Error: " + err.message);
          btn.textContent = 'Place Order';
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
